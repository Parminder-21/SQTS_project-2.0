<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placed Students | Sparkque Tech Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <!-- main header -->
    <header class="page-header">
        <div class="container fade-in">
            <h1 style="font-size: 3.5rem; margin-bottom: 15px; color: white;">Alumni Network</h1>
            <p style="color: var(--text-muted); font-size: 1.2rem; max-width: 600px; margin: 0 auto;">Discover where our past students are making a difference today.</p>
        </div>
    </header>

    <!-- grid wrapper -->
    <section class="section-padding">
        <div class="container">
            <!-- js fills this in -->
            <div id="students-grid" class="card-grid" style="grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));"></div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="js/main.js"></script>
    <script src="js/data.js"></script>
</body>
</html>
