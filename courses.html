<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses | Sparkque Tech Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <!-- hero top -->
    <header class="page-header">
        <div class="container fade-in">
            <h1 style="font-size: 3.5rem; margin-bottom: 15px; color: white;">Our Courses</h1>
            <p style="color: var(--text-muted); font-size: 1.2rem; max-width: 600px; margin: 0 auto;">Select from our wide range of industry-aligned professional training programs.</p>
        </div>
    </header>

    <!-- course list area -->
    <section class="section-padding">
        <div class="container">
            <!-- generated nav buttons -->
            <div id="course-filters" class="filter-container fade-in"></div>

            <!-- course cards -->
            <div id="all-courses" class="card-grid"></div>
        </div>
    </section>

    <!-- modal popup overlay -->
    <div class="modal-overlay" id="course-modal">
        <div class="modal-content">
            <button class="close-modal"><i class="fas fa-times"></i></button>
            <div id="course-modal-body">
                <!-- script fills this -->
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/main.js"></script>
    <script src="js/data.js"></script>
</body>
</html>
