<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Sparkque Tech Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .contact-form {
            background-color: var(--bg-light);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: rgba(15, 23, 42, 0.5);
            color: white;
            font-family: inherit;
            transition: var(--transition);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }
        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }
        .contact-info-card {
            padding: 30px;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.1), rgba(236, 72, 153, 0.1));
            border-radius: 20px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
        }
        .contact-info-card h3 {
            margin-bottom: 20px;
            color: white;
        }
        .contact-info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .contact-info-item i {
            color: var(--primary-color);
            font-size: 1.2rem;
            width: 25px;
            text-align: center;
        }
        .map-container iframe {
            width: 100%;
            height: 300px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <!-- fancy header -->
    <header class="page-header">
        <div class="container fade-in">
            <h1 style="font-size: 3.5rem; margin-bottom: 15px; color: white;">Get in Touch</h1>
            <p style="color: var(--text-muted); font-size: 1.2rem; max-width: 600px; margin: 0 auto;">Have any questions? We'd love to hear from you. Drop us a message below.</p>
        </div>
    </header>

    <section class="section-padding">
        <div class="container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 50px;">
            <!-- left column: details and map -->
            <div class="fade-in">
                <div class="contact-info-card">
                    <h3>Institute Details</h3>
                    <div class="contact-info-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>123 Tech Park, AB Road, Indore, Madhya Pradesh 452001</span>
                    </div>
                    <div class="contact-info-item">
                        <i class="fas fa-phone-alt"></i>
                        <span>+91 98765 43210</span>
                    </div>
                    <div class="contact-info-item">
                        <i class="fas fa-envelope"></i>
                        <span>info@sqts.com</span>
                    </div>
                    <div class="contact-info-item">
                        <i class="far fa-clock"></i>
                        <span>Mon - Sat: 9:00 AM - 7:00 PM</span>
                    </div>
                </div>

                <div class="map-container">
                    <!-- embed gmaps iframe -->
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d117763.55655768393!2d75.86470355!3d22.724108849999997!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3962fcad1b410ddb%3A0x96ec4da356240f4!2sIndore%2C%20Madhya%20Pradesh!5e0!3m2!1sen!2sin!4v1700000000000!5m2!1sen!2sin" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>

            <!-- right column: form -->
            <div class="fade-in">
                <div class="contact-form">
                    <h3 style="margin-bottom: 25px; color: white; font-size: 1.5rem;">Send a Message</h3>
                    <!-- fake form submit for demo -->
                    <form action="#" onsubmit="event.preventDefault(); alert('Message sent successfully! We will get back to you soon.'); this.reset();">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" class="form-control" required placeholder="John Doe">
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" class="form-control" required placeholder="john@example.com">
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" class="form-control" required placeholder="+91 00000 00000">
                        </div>
                        <div class="form-group">
                            <label for="course-interest">Course Interest</label>
                            <select id="course-interest" class="form-control" required>
                                <option value="" disabled selected>Select a course</option>
                                <!-- data.js populates this -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="message">Your Message</label>
                            <textarea id="message" class="form-control" required placeholder="How can we help you?"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="js/main.js"></script>
    <script src="js/data.js"></script>
</body>
</html>
